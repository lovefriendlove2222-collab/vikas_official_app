name: Build Vikas Ultra Max
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Master Build
        run: |
          # 1. पुरानी फाइलों का बैकअप
          mkdir -p b
          cp -r lib/* b/
          cp android/app/google-services.json . 
          
          # 2. नया ढांचा बनाना (y के साथ)
          flutter create . --overwrite --org com.vikas.pasoriya
          
          # 3. नाम और SDK की सेटिंग (यही एरर ठीक करेगा)
          sed -i 's/android:label=".*"/android:label="Vikas Pasoriya Official"/g' android/app/src/main/AndroidManifest.xml
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 4. कोडिंग वापस डालना
          rm -rf lib/
          mv b lib/
          mv google-services.json android/app/
          
          # 5. पैकेज जोड़ना और फाइनल तैयारी
          flutter pub add cloud_firestore firebase_core url_launcher
          flutter pub get
          flutter build apk --release

      - name: Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Ultra_Max
          path: build/app/outputs/flutter-apk/app-release.apk

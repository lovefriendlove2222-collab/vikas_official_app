name: Build Vikas Ultra Max
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Master Build
        run: |
          # 1. पुरानी फाइलों का बैकअप लेना (ताकि कोडिंग न उड़े)
          mkdir -p b
          cp -r lib/* b/
          cp android/app/google-services.json . 
          
          # 2. नया प्रोजेक्ट ढांचा तैयार करना
          flutter create . --overwrite --org com.vikas.pasoriya
          
          # 3. SDK 19 को 21 में बदलना (ताकि एरर न आए)
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 4. अपनी पुरानी कोडिंग और JSON फाइल वापस डालना
          rm -rf lib/
          mv b lib/
          mv google-services.json android/app/
          
          # 5. जरूरी लाइब्रेरी जोड़ना
          flutter pub add firebase_core cloud_firestore
          flutter pub get
          
          # 6. फाइनल APK बनाना
          flutter build apk --release

      - name: Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk

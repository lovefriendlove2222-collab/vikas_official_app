name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Build Project
        run: |
          # 1. अपनी असली कोडिंग और गूगल की चाबी (JSON) का बैकअप लो
          mkdir -p backup_data
          cp -r lib/* backup_data/
          cp android/app/google-services.json . 
          
          # 2. नया और साफ़ प्रोजेक्ट ढांचा बनाओ
          flutter create . --overwrite --org com.vikas.pasoria
          
          # 3. बैकअप से फाइलें वापस उनकी सही जगह डालो
          rm -rf lib/
          mv backup_data lib/
          mv google-services.json android/app/
          
          # 4. मोबाइल वर्जन सेटिंग्स (ताकि एरर न आए)
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 5. फायरबेस और क्लाउड डेटाबेस को जोड़ो
          flutter pub add cloud_firestore firebase_core
          flutter pub get
          
          # 6. अब बनाओ असली वाला धमाका APK
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk

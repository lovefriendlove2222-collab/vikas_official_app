name: Build Vikas Ultra Max
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Master Build and SHA Keys
        run: |
          # 1. जरूरी सेटअप
          mkdir -p android/app
          mkdir -p b
          cp -r lib/* b/ || true
          cp android/app/google-services.json . || true
          
          # 2. SHA-256 चाबी दिखाना (इसे कॉपी करके Firebase में डालना)
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Vikas, OU=Dev, O=Vikas, L=Sonipat, S=Haryana, C=IN" || true
          echo "************************************************************"
          echo "VIKAS BHAI, AAPKI SHA-256 CHABI YE RAHI:"
          keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android | grep "SHA256"
          echo "************************************************************"

          # 3. नया प्रोजेक्ट और SDK फिक्स (Version 21)
          flutter create . --overwrite --org com.vikas.pasoriya
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 4. कोडिंग वापस डालना
          rm -rf lib/
          mv b lib/
          mv google-services.json android/app/ || true
          
          # 5. सभी जरूरी लाइब्रेरीज एक साथ जोड़ना
          flutter pub add firebase_core cloud_firestore firebase_storage image_picker
          flutter pub get
          flutter build apk --release

      - name: Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Build Project
        run: |
          # अपनी असली कोडिंग को पहले कहीं छुपा कर रख लो
          mkdir -p backup_lib
          cp -r lib/* backup_lib/
          
          # नया प्रोजेक्ट बनाओ (ये फाइलों को मिटाता है)
          flutter create . --overwrite --org com.vikas.pasoria
          
          # अब अपनी असली कोडिंग वापस डाल दो
          rm -rf lib/
          mv backup_lib lib/
          
          # वर्जन 21 सेट करो
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          flutter pub add cloud_firestore firebase_core
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk

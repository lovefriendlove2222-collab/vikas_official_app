name: Build Vikas Ultra Max
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Master Build
        run: |
          # 1. पुरानी फाइलों का बैकअप
          mkdir -p b
          cp -r lib/* b/
          cp android/app/google-services.json . 
          
          # 2. नया प्रोजेक्ट बनाना (Y के साथ)
          flutter create . --overwrite --org com.vikas.pasoriya
          
          # 3. सेटिंग्स और प्लगइन फिक्स (यही null-error हटाएगा)
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 4. कोडिंग वापस डालना
          rm -rf lib/
          mv b lib/
          mv google-services.json android/app/
          
          # 5. पैकेज जोड़ना (Firebase Core और Firestore)
          flutter pub add firebase_core cloud_firestore
          
          # 6. प्लगइन्स को क्लीन बिल्ड करना
          flutter pub get
          flutter clean
          run: cd android && ./gradlew signingReport
         run: keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android
          flutter build apk --release

      - name: Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk

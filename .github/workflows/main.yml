name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # यहाँ हम रोबोट को खुद सारा सामान (Android folders) बनाने को कह रहे हैं
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          
      - run: |
          flutter create . --overwrite --org com.vikas.pasoria
          # आपकी पुरानी फाइलें वापस उनकी जगह पर डाल रहे हैं
          cp android/app/google-services.json . || true 
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Vikas Ultra Max
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Master Build
        run: |
          # 1. जरूरी फोल्डर बनाना
          mkdir -p android/app
          
          # 2. खुद से एक चाबी (Keystore) बनाना ताकि एरर न आए
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Vikas, OU=Dev, O=Vikas, L=Sonipat, S=Haryana, C=IN"
          
          # 3. अब इस चाबी की SHA-1 स्क्रीन पर दिखाना
          echo "------ आपकी SHA-1 चाबी यहाँ है ------"
          keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1
          echo "------------------------------------"

          # 4. बाकी का काम (Flutter सेटअप)
          cp -r lib/* .backup_lib || true
          flutter create . --overwrite --org com.vikas.pasoriya
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle
          flutter pub add firebase_core cloud_firestore
          flutter pub get
          flutter build apk --release

      - name: Final Result
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_App_Final
          path: build/app/outputs/flutter-apk/app-release.apk
